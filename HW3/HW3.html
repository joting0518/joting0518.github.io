<!DOCTYPE html>
<html>
<head>
<title>Page Title</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* {
  box-sizing: border-box;
}

/* Style the body */
body {
  font-family: Arial;
  margin-left:auto;
}

/* Header/logo Title */
.header {
  padding: 20px;
  text-align: center;
  background: #1abc9c;
  color: white;
  flex: 50%;
  margin-left:auto

}
.container{
    width: 70%;
    background: #fff;
    padding: 25px 30px;
    border-radius: 5px;
    margin: 10%;
    margin-left: auto;
    margin-right: auto;
}

.area{
  padding: 20px;
  text-align: center;
  background: #1abc9c;
  color: powderblue;
  margin: 0 auto;
}
.pic{
    margin: 1%;
}
  


/* Column container */
.row {  
  display: flex;
  flex-wrap: wrap;
}

/* Create two unequal columns that sits next to each other */
/* Sidebar/left column */
.side {
  flex: 50%;
  background-color: #f1f1f1;
  padding: 20px;
  margin-left:auto
}

/* Main column */
.main {
  flex: 50%;
  background-color: white;
  padding: 20px;
  margin-left:auto
}

/* Fake image, just for this example */
.fakeimg {
  background-color: #aaa;
  width: 100%;
  padding: 20px;
  margin-right:auto
}

/* Footer */
.footer {
  padding: 20px;
  text-align: center;
  background: #ddd;
}
.text{
  padding: 130px;
  text-align: center;
  background: lightpink;
  margin-left:auto
  valign: center;
}

/* Responsive layout - when the screen is less than 700px wide, make the two columns stack on top of each other instead of next to each other */
@media screen{
	body{
        background: linear-gradient(135deg, #50b7e6, #9b20b6);
    }
}
@media print{
	body{
        background: linear-gradient(135deg, #6c437c, #345f8b);
    }
</style>
</head>
<body>

<!-- input1 -->
<div class="container"></div>
<div class="header">
  <p align=left><label>Input1
	<input type = "text" placeholder="input1" size = "25" maxlength = "30" style="width:90.5%;">
	</label></p>
  
</div>

<!-- input2&3 -->
<div class="row">
  <div class="header">
    <p align=left><label>Input2
	<input  type = "text" placeholder="input2"size = "25" maxlength = "30" style="width:80%;">
	</label></p>
    

    <!-- -->
    
  </div>
  <div class="main">
    <p align=left><label>Input3
	<input name = "name" placeholder="input3" type = "text" size = "25" maxlength = "30" style="width:80%;">
	</label></p>
     
  </div>
</div>
<!-- input4 -->
<div class="main">
  <p align=left><label>Input4
	<input name = "name" placeholder="input4" type = "text" size = "25" maxlength = "30" style="width:90.5%;">
	</label></p>
  
</div>



<!-- textarea -->
<div class="area">
  <p align=left><label>textarea
	<textarea style="align: top;" rows="6" cols="40" style="width:89.5%;" >
make it not resizable</textarea>
	</label></p>
</div>

<div class="pic">
<img src="https://www.w3schools.com/images/w3schools_green.jpg" alt="Pineapple" style="width:170px;height:170px;margin-left:15px;">
</div>
</body>
</html>
