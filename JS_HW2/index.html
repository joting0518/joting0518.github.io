



<!DOCTYPE HTML>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
</head>
	<body>
		<div id="block">
		<p align=middle>JS Calculator</p><br>
		<form>
			<p align=middle><label>Number 1</label></p><br>
			<p align=middle><input type="number"id="num1" class="input"></p><br>

			<p align=middle><label >Number 2</label></p><br>
			<p align=middle><input type="number" id="num2" class="input"></p><br>

			<p align=middle><label >Operate way?</label><br></p>
			<p align=middle><select id="operate" name="select" >
					<option value="0">+</option>
					<option value="1">-</option>
					<option value="2">x</option>
					<option value="3">/</option>
				</select></p><br>
		</form>
		<p align=middle><input type="button" value="" id="operatebutton" onclick="calculator()"></p>

		<p align=middle>Result=<span id="result"></span></p>

	<script>
		
		var button = document.getElementById("operatebutton");
		var menu = document.getElementById("operate");
		
		function start(){
			menu.addEventListener("change",changeButton,false);

		}

		function calculator(){
			var n1 = parseInt(document.getElementById("num1").value);
			var n2 = parseInt (document.getElementById("num2").value); 
			var selectedValue = menu.options[menu.selectedIndex].value;
			switch (selectedValue){
			case"0":
				document.getElementById("result").innerHTML=add(n1, n2);
				break;
			case"1":
				document.getElementById("result").innerHTML = minus(n1, n2);
				break;
			case"2":
				document.getElementById("result").innerHTML = multiply(n1, n2);
				break;
			case"3":
				document.getElementById("result").innerHTML=divide(n1, n2);	
				break;
			}
		}
			
		

			
		function changeButton(){
			
			var selectedValue = menu.options[menu.selectedIndex].value;
			switch (selectedValue){
			case"0":
				button.setAttribute( "value", "add") ;
				break;
			case"1":
				button.setAttribute( "value", "subtract");
				break;
			case"2":
				button.setAttribute("value", "multiply");
				break;
			case"3":
				button.setAttribute( "value", "divide");
				break;
			}
		}
		function add(num1,num2){
			return num1+num2;
		}	
		function minus(num1,num2){
			return num1-num2;
		}	
		function multiply(num1,num2){
			return num1*num2;
		}
		function divide(num1,num2){
			return num1/num2;
		}
		

   window.addEventListener("load", start,false);
    </script>
    </body>
    
</html>
